<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Interactive Landing Page</title>

<style>
*{
    margin:0;
    padding:0;
    box-sizing:border-box;
    font-family:Arial, Helvetica, sans-serif;
}

body{
    background:#f4f4f4;
    transition:.4s;
}

header{
    background:#0077cc;
    color:white;
    padding:20px;
    text-align:center;
}

nav{
    background:#333;
    padding:15px;
    text-align:center;
}

nav a{
    color:white;
    text-decoration:none;
    margin:15px;
}

.container{
    width:80%;
    margin:auto;
    padding:30px;
}

.card{
    background:white;
    padding:25px;
    border-radius:10px;
    box-shadow:0 0 10px rgba(0,0,0,.2);
}

button{
    padding:10px 20px;
    margin:10px 0;
    border:none;
    cursor:pointer;
    border-radius:5px;
    background:#0077cc;
    color:white;
}

button:hover{
    background:#005fa3;
}

input{
    width:100%;
    padding:10px;
    margin:10px 0;
}

.error{
    color:red;
    font-size:14px;
}

.success{
    color:green;
    font-weight:bold;
}

.dark{
    background:#1b1b1b;
    color:white;
}

.dark .card{
    background:#2b2b2b;
}

.dark nav{
    background:black;
}

.hover-box{
    margin-top:20px;
    padding:20px;
    background:orange;
    transition:.3s;
    text-align:center;
    border-radius:10px;
}

</style>
</head>
<body>

<header>
<h1 id="heading">Welcome to My Interactive Landing Page</h1>
<p id="greeting"></p>
</header>

<nav>
<a href="#">Home</a>
<a href="#">About</a>
<a href="#">Services</a>
<a href="#">Contact</a>
</nav>

<div class="container">

<div class="card">

<h2>Dark Mode</h2>

<button id="darkBtn">Enable Dark Mode</button>

<hr><br>

<h2>Click Counter</h2>

<h3 id="count">0</h3>

<button id="increase">Click Me</button>
<button id="reset">Reset</button>

<hr><br>

<h2>Student Registration</h2>

<form id="myForm">

<input
type="text"
id="name"
placeholder="Enter Name">

<div id="nameError" class="error"></div>

<input
type="email"
id="email"
placeholder="Enter Email">

<div id="emailError" class="error"></div>

<input
type="text"
id="city"
placeholder="Enter City">

<div id="cityError" class="error"></div>

<button type="submit">Submit</button>

</form>

<p id="message"></p>

<div class="hover-box" id="box">
Hover Mouse Here
</div>

</div>

</div>

<script>

// Variables

let counter=0;

// Greeting Function

function showGreeting(name)
{
document.getElementById("greeting").innerHTML="Hello "+name+" 👋";
}

// Dark Mode

const darkBtn=document.getElementById("darkBtn");

darkBtn.addEventListener("click",function(){

document.body.classList.toggle("dark");

if(document.body.classList.contains("dark"))
{
darkBtn.innerHTML="Disable Dark Mode";
}
else
{
darkBtn.innerHTML="Enable Dark Mode";
}

});

// Counter

document.getElementById("increase").addEventListener("click",function(){

counter++;

document.getElementById("count").innerHTML=counter;

});

document.getElementById("reset").addEventListener("click",function(){

counter=0;

document.getElementById("count").innerHTML=counter;

});

// Form Validation

document.getElementById("myForm").addEventListener("submit",function(e){

e.preventDefault();

let name=document.getElementById("name").value.trim();

let email=document.getElementById("email").value.trim();

let city=document.getElementById("city").value.trim();

document.getElementById("nameError").innerHTML="";
document.getElementById("emailError").innerHTML="";
document.getElementById("cityError").innerHTML="";
document.getElementById("message").innerHTML="";

let valid=true;

if(name=="")
{
document.getElementById("nameError").innerHTML="Name Required";
valid=false;
}

if(!email.includes("@"))
{
document.getElementById("emailError").innerHTML="Valid Email Required";
valid=false;
}

if(city=="")
{
document.getElementById("cityError").innerHTML="City Required";
valid=false;
}

if(valid)
{
document.getElementById("message").className="success";
document.getElementById("message").innerHTML="Form Submitted Successfully";

showGreeting(name);
}

});

// Hover Effect (Extra Feature)

const box=document.getElementById("box");

box.addEventListener("mouseover",function(){

box.style.background="green";
box.innerHTML="Mouse is Here 😊";

});

box.addEventListener("mouseout",function(){

box.style.background="orange";
box.innerHTML="Hover Mouse Here";

});

</script>

</body>
</html>
